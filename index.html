// ─── API CALL ─────────────────────────────────────────────────────────────────
async function callClaude(messages, maxTokens = 900) {
  const res = await fetch("/api/claude", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({model:"claude-sonnet-4-6", max_tokens:maxTokens, messages}),
  });
  const data = await res.json();
  const text = data.content?.find(b => b.type === "text")?.text || "";
  return JSON.parse(text.replace(/```json|```/g,"").trim());
}

// ─── POWER CARD ───────────────────────────────────────────────────────────────
function PowerCardBtn({card, used, onUse, disabled}) {
  const [hov, setHov] = useState(false);
  return (
    <button
      onClick={() => !used && !disabled && onUse(card)}
      disabled={used||disabled}
      onMouseEnter={() => setHov(true)}
      onMouseLeave={() => setHov(false)}
      style={{
        flex:1, background:used?"#090f1a":"linear-gradient(135deg,#1E293B,#162032)",
        border:`1px solid ${hov&&!used&&!disabled?"#FBBF24":used?"#111827":"#334155"}`,
        borderRadius:10, padding:"10px 5px", cursor:used||disabled?"default":"pointer",
        opacity:used?0.3:1, transition:"all 0.2s", textAlign:"center",
      }}
    >
      <div style={{fontSize:20}}>{card.icon}</div>
      <div style={{fontSize:10,color:used?"#1E293B":"#E2E8F0",fontWeight:700,marginTop:3}}>{card.label}</div>
      <div style={{fontSize:9,color:"#475569",marginTop:1}}>{card.desc}</div>
    </button>
  );
}

        escolhas:[
          {texto:"Ignorar e fingir que está dormindo",efeitos:{aprovacao:3,congresso:-4,economia:0,imprensa:-8},resultado:"Tweet virou meme nacional."},
          {texto:"Responder no mesmo nível às 3h18",efeitos:{aprovacao:10,congresso:-10,economia:0,imprensa:5},resultado:"Povo adorou. Congresso preocupado."},
          {texto:"Ligar pro pai do Nicolas",efeitos:{aprovacao:15,congresso:5,economia:0,imprensa:12},resultado:"Virou o político mais humano."},
        ],
      });
    }
    setLoading(false);
  }, []);

  const fetchReaction = async (choiceText, effects, ideology) => {
    const ideoLabel = IDEOLOGIES.find(i => i.id === ideology)?.label || "Centro";
    const isGoodForPeople = (effects.aprovacao || 0) > 0;
    const prompt = `Gere uma reação rápida no Twitter de um personagem político brasileiro real à decisão do presidente ${ideoLabel}.
Decisão: "${choiceText}"
Tom: ${isGoodForPeople ? "oposição criticando" : "aliado defendendo"}. Curto, autêntico, pode ter humor.
Responda APENAS JSON válido:
{"nome":"Nome completo","handle":"handle_sem_arroba","cargo":"Cargo · Partido-UF","verificado":true,"sentimento":"${isGoodForPeople?"critica":"apoio"}","comentario":"comentário max 18 palavras","replies":"1.2k","rt":"4.8k","likes":"11k"}`;
    try {
      const data = await callClaude([{role:"user",content:prompt}], 300);
      setReaction(data);
    } catch {
      setReaction({nome:"Nicolas Ferreira",handle:"nicolasferreiraDEM",cargo:"Deputado Federal · PL-DF",verificado:true,sentimento:"critica",comentario:"Isso aqui é um escândalo! Farei uma live às 2h explicando tudo. 🇧🇷",replies:"1.2k",rt:"8.4k",likes:"22k"});
    }
  };

  const startGame = () => {
    setStats(INITIAL_STATS); setRound(0); setMonth(0);
    setHistory([]); setUsedCards([]); setGameOverKey(null); setScenario(null); setReaction(null);
    setPhase("playing");
    fetchScenario(INITIAL_STATS, [], profile.ideology, 0);
  };

  const applyEffects = async (effects, label) => {
    if (resolving) return;
    setResolving(true); setReaction(null);
    const newStats = {};
    let failKey = null;
    for (const k of Object.keys(stats)) {
      const v = Math.max(0, Math.min(100, stats[k] + (effects[k]||0)));
      newStats[k] = v;
      if (v <= 0 && !failKey) failKey = k;
    }
    const newHistory = [...history, {choice:label}];
    const newRound = round + 1;
    const newMonth = (month + 3) % 12;
    setStats(newStats); setHistory(newHistory); setRound(newRound); setMonth(newMonth);
    fetchReaction(label, effects, profile.ideology);
    await new Promise(r => setTimeout(r, 700));
    if (failKey) { setGameOverKey(failKey); setPhase("gameover"); setResolving(false); return; }
    if (newRound >= 16) { setGameOverKey("vitoria"); setPhase("gameover"); setResolving(false); return; }
    setResolving(false);
    fetchScenario(newStats, newHistory, profile.ideology, newRound);
  };

  const useCard = (card) => {
    if (usedCards.includes(card.id)||resolving||loading) return;
    setUsedCards(p => [...p, card.id]);
    applyEffects(card.effects, card.label);
  };

  const ideoColor = IDEOLOGIES.find(i => i.id === profile.ideology)?.color || "#FBBF24";
  const dateLabel = `${MONTHS[month]} ${2027+Math.floor(round/4)} · ${Math.floor(round/4)+1}º ano`;
  const BASE = {minHeight:"100vh",fontFamily:"'Inter', system-ui, sans-serif",color:"#F1F5F9",display:"flex",flexDirection:"column",alignItems:"center"};

  // ── ONBOARDING ────────────────────────────────────────────────────────────────
  if (phase === "onboarding") {
    const canStart = profile.name.trim().length > 0 && !!profile.ideology;
    return (
      <div style={{...BASE, background:"#0a0a12", justifyContent:"center", padding:"24px 16px"}}>
        <div style={{textAlign:"center",marginBottom:26}}>
          <div style={{fontSize:38,marginBottom:6}}>🇧🇷</div>
          <div style={{fontSize:9,letterSpacing:5,color:"#1E293B",textTransform:"uppercase",marginBottom:4}}>Simulador Político Satírico</div>
          <h1 style={{fontSize:"clamp(30px,9vw,54px)",fontWeight:900,lineHeight:0.9,letterSpacing:-2}}>
            <span style={{color:"#FBBF24"}}>SOBREVIVA</span><br/>
            <span style={{color:"#1E293B",fontSize:"0.42em",fontWeight:400,letterSpacing:4}}>AO MANDATO</span>
          </h1>
        </div>
        <div style={{width:"100%",maxWidth:430,display:"flex",flexDirection:"column",gap:16}}>
          <div>
            <div style={{fontSize:9,color:"#334155",letterSpacing:3,textTransform:"uppercase",marginBottom:6}}>Seu sobrenome</div>
            <input value={profile.name} onChange={e => setProfile(p=>({...p,name:e.target.value}))}
              placeholder="Ex: Silva, Temer, Bolsonaro..." maxLength={20}
              style={{width:"100%",background:"#0F172A",border:"1px solid #1E293B",borderRadius:8,padding:"11px 14px",color:"#F1F5F9",fontSize:14,fontFamily:"inherit",transition:"border-color 0.15s"}}
              onFocus={e=>e.target.style.borderColor="#FBBF24"} onBlur={e=>e.target.style.borderColor="#1E293B"} />
          </div>
          <div>
            <div style={{fontSize:9,color:"#334155",letterSpacing:3,textTransform:"uppercase",marginBottom:6}}>Como quer ser chamado(a)?</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
              {TREATMENTS.map(t => (
                <button key={t.id} onClick={()=>setProfile(p=>({...p,treatment:t.id}))} style={{
                  background:profile.treatment===t.id?"#FBBF24":"#0F172A",
                  color:profile.treatment===t.id?"#0a0a12":"#475569",
                  border:"1px solid",borderColor:profile.treatment===t.id?"#FBBF24":"#1E293B",
                  borderRadius:20,padding:"5px 12px",fontSize:11,fontWeight:700,
                  cursor:"pointer",fontFamily:"inherit",transition:"all 0.15s",
                }}>{t.label}</button>
              ))}
            </div>
          </div>
          <div>
            <div style={{fontSize:9,color:"#334155",letterSpacing:3,textTransform:"uppercase",marginBottom:6}}>Sua ideologia</div>
            <div style={{display:"flex",gap:7}}>
              {IDEOLOGIES.map(i => (
                <button key={i.id} onClick={()=>setProfile(p=>({...p,ideology:i.id}))} style={{
                  flex:1, background:profile.ideology===i.id?i.color+"18":"#0F172A",
                  border:"1px solid", borderColor:profile.ideology===i.id?i.color:"#1E293B",
                  borderRadius:10, padding:"11px 5px", cursor:"pointer", transition:"all 0.15s", textAlign:"center",
                }}>
                  <div style={{fontSize:22}}>{i.icon}</div>
                  <div style={{fontSize:11,fontWeight:800,color:profile.ideology===i.id?i.color:"#475569",marginTop:4}}>{i.label}</div>
                  <div style={{fontSize:9,color:"#1E293B",marginTop:2}}>{i.desc}</div>
                </button>
              ))}
            </div>
          </div>
          <div>
            <div style={{fontSize:9,color:"#334155",letterSpacing:3,textTransform:"uppercase",marginBottom:6}}>Avatar</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {AVATARS.map(av => (
                <button key={av.id} onClick={()=>setProfile(p=>({...p,avatar:av}))} style={{background:"transparent",border:"none",cursor:"pointer",textAlign:"center",padding:3}}>
                  <AvatarHead face={av.face} size={48} selected={profile.avatar.id===av.id} />
                  <div style={{fontSize:9,color:profile.avatar.id===av.id?"#FBBF24":"#1E293B",marginTop:3,fontWeight:700}}>{av.label}</div>
                </button>
              ))}
            </div>
          </div>
          {canStart && (
            <div style={{background:"#0F172A",border:"1px solid #1E293B",borderRadius:10,padding:12,display:"flex",alignItems:"center",gap:11,animation:"fadeUp 0.25s ease"}}>
              <AvatarHead face={profile.avatar.face} size={44} selected />
              <div>
                <div style={{fontSize:9,color:"#1E293B"}}>Presidindo como</div>
                <div style={{fontSize:14,fontWeight:800,color:"#F1F5F9"}}>{getTreatment()}</div>
                <div style={{fontSize:10,color:ideoColor,marginTop:2}}>{IDEOLOGIES.find(i=>i.id===profile.ideology)?.icon} {IDEOLOGIES.find(i=>i.id===profile.ideology)?.label}</div>
              </div>
            </div>
          )}
          <button onClick={startGame} disabled={!canStart} style={{
            width:"100%", background:canStart?"linear-gradient(90deg,#92400E,#FBBF24)":"#0F172A",
            color:canStart?"#000":"#1E293B", border:"none", borderRadius:10,
            padding:"14px", fontSize:14, fontWeight:900, cursor:canStart?"pointer":"default",
            letterSpacing:2, fontFamily:"inherit",
          }}>TOMAR POSSE →</button>
          <div style={{fontSize:9,color:"#1a2535",textAlign:"center"}}>Sátira política. Qualquer semelhança com a realidade é proposital.</div>
        </div>
      </div>
    );
  }

  // ── GAME OVER ─────────────────────────────────────────────────────────────────
  if (phase === "gameover") {
    const go = GAMEOVER[gameOverKey];
    const isWin = gameOverKey === "vitoria";
    return (
      <div style={{...BASE,background:isWin?"#050f08":"#0f0508",justifyContent:"center",padding:24,textAlign:"center"}}>
        <AvatarHead face={profile.avatar.face} size={68} />
        <div style={{fontSize:50,margin:"12px 0 6px"}}>{go.emoji}</div>
        <h1 style={{fontSize:"clamp(22px,7vw,44px)",fontWeight:900,color:isWin?"#22C55E":"#EF4444",marginBottom:5}}>{go.title}</h1>
        <p style={{color:"#334155",fontSize:12,marginBottom:5}}>{getTreatment()}</p>
        <p style={{color:"#475569",fontSize:13,marginBottom:22,maxWidth:320,lineHeight:1.6}}>{go.sub}</p>
        <div style={{background:"#0F172A",border:"1px solid #1E293B",borderRadius:12,padding:16,marginBottom:22,width:"100%",maxWidth:320}}>
          <div style={{display:"flex",flexDirection:"column",gap:9}}>
            {Object.keys(stats).map(k => <StatBar key={k} k={k} value={stats[k]} />)}
          </div>
          <div style={{marginTop:11,fontSize:10,color:"#1E293B"}}>
            {round} trimestres · {Math.floor(round*3/12)} anos e {(round*3)%12} meses no poder
          </div>
        </div>
        <button onClick={()=>setPhase("onboarding")} style={{
          background:"#0F172A",color:"#64748B",border:"1px solid #1E293B",borderRadius:10,
          padding:"12px 32px",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit",
        }}>🔄 Jogar de novo</button>
      </div>
    );
  }

  // ── PLAYING ───────────────────────────────────────────────────────────────────
  const isSatira = isSatiraRound(round);
  return (
    <div style={{...BASE,background:"#0a0a12",padding:"14px 12px 40px"}}>
      <div style={{width:"100%",maxWidth:520,display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
        <AvatarHead face={profile.avatar.face} size={34} />
        <div style={{flex:1}}>
          <div style={{fontSize:12,fontWeight:700,color:"#E2E8F0"}}>{getTreatment()}</div>
          <div style={{fontSize:10,color:ideoColor}}>{IDEOLOGIES.find(i=>i.id===profile.ideology)?.icon} {IDEOLOGIES.find(i=>i.id===profile.ideology)?.label}</div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{fontSize:10,color:"#334155"}}>{dateLabel}</div>
          {isSatira && <div style={{fontSize:9,color:"#FBBF2488"}}>😂 modo caos</div>}
        </div>
      </div>

      <div style={{width:"100%",maxWidth:520,background:"#0F172A",border:"1px solid #1E293B",borderRadius:10,padding:"10px 13px",marginBottom:10,display:"flex",gap:12}}>
        {Object.keys(stats).map(k => <StatBar key={k} k={k} value={stats[k]} />)}
      </div>

      <div style={{width:"100%",maxWidth:520,marginBottom:10}}>
        <div style={{fontSize:9,color:"#1E293B",letterSpacing:3,textTransform:"uppercase",marginBottom:5}}>⚡ Cartas de Poder</div>
        <div style={{display:"flex",gap:6}}>
          {POWER_CARDS.map(c => <PowerCardBtn key={c.id} card={c} used={usedCards.includes(c.id)} onUse={useCard} disabled={resolving||loading} />)}
        </div>
      </div>

      <div style={{width:"100%",maxWidth:520}}>
        {loading ? (
          <div style={{background:"#0F172A",border:"1px solid #1E293B",borderRadius:10,padding:"24px 20px",textAlign:"center",marginBottom:10}}>
            <div style={{display:"flex",gap:6,justifyContent:"center",marginBottom:7}}>
              {[0,1,2].map(i => <div key={i} style={{width:7,height:7,borderRadius:"50%",background:"#FBBF24",animation:`pulse 0.9s ${i*0.25}s infinite`}} />)}
            </div>
            <div style={{fontSize:11,color:"#1E293B"}}>{isSatira?"Preparando o caos...":"Assessor preparando relatório..."}</div>
          </div>
        ) : scenario && <ScenarioCard scenario={scenario} dateLabel={dateLabel} />}
      </div>

      {scenario && !loading && (
        <div style={{width:"100%",maxWidth:520}}>
          <div style={{fontSize:9,color:"#1E293B",letterSpacing:3,textTransform:"uppercase",marginBottom:6}}>
            O que você faz, {profile.name||"Presidente"}?
          </div>
          {scenario.escolhas.map((ch, i) => (
            <ChoiceButton key={i} ch={ch} i={i} ideoColor={ideoColor} resolving={resolving} onChoose={applyEffects} />
          ))}
        </div>
      )}

      {reaction && <ReactionPopup reaction={reaction} onDone={()=>setReaction(null)} />}
    </div>
  );
}

function ChoiceButton({ch, i, ideoColor, resolving, onChoose}) {
  const [hov, setHov] = useState(false);
  return (
    <button
      disabled={resolving}
      onClick={() => onChoose(ch.efeitos, ch.texto)}
      onMouseEnter={() => setHov(true)}
      onMouseLeave={() => setHov(false)}
      style={{
        width:"100%", background:hov&&!resolving?ideoColor+"0d":"#0F172A",
        border:`1px solid ${hov&&!resolving?ideoColor:"#1E293B"}`,
        borderRadius:8, padding:"11px 13px", cursor:resolving?"not-allowed":"pointer",
        textAlign:"left", display:"flex", alignItems:"center", gap:10,
        transition:"all 0.15s", opacity:resolving?0.6:1, fontFamily:"inherit", marginBottom:6,
      }}
    >
      <span style={{background:ideoColor+"20",color:ideoColor,borderRadius:5,padding:"2px 8px",fontSize:11,fontWeight:800,flexShrink:0}}>{String.fromCharCode(65+i)}</span>
      <span style={{fontSize:13,color:"#CBD5E1",lineHeight:1.3}}>{ch.texto}</span>
    </button>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
